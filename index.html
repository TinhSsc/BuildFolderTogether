<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BuildFolderTogether - Collaborative File Tree Generator</title>

  <!-- SEO Meta Tags -->
  <meta name="description"
    content="BuildFolderTogether is a real-time collaborative file tree generator and editor. Create, share, export and import folder structures easily.">
  <meta name="keywords"
    content="folder structure, file tree, directory generator, real-time collaboration, webrtc, folder tree creator, developer tools, clean architecture">
  <meta name="author" content="BuildFolderTogether">
  <meta name="robots" content="index, follow">

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://build-folder-together.vercel.app/">
  <meta property="og:title" content="BuildFolderTogether - Collaborative File Tree Generator">
  <meta property="og:description"
    content="Design and share your project's folder structure in real-time with peer-to-peer collaboration.">
  <meta property="og:image" content="https://build-folder-together.vercel.app/assets/images/og-image.png">

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:url" content="https://build-folder-together.vercel.app/">
  <meta property="twitter:title" content="BuildFolderTogether - Collaborative File Tree Generator">
  <meta property="twitter:description"
    content="Design and share your project's folder structure in real-time with peer-to-peer collaboration.">
  <meta property="twitter:image" content="https://build-folder-together.vercel.app/assets/images/og-image.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="assets/icons/favicon.png">
  <link rel="icon" type="image/svg+xml" href="assets/icons/favicon.svg">

  <!-- Boxicons -->
  <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

  <!-- Google Search Console Verification -->
  <meta name="google-site-verification" content="4QOZrNsZO182PpCsQ1ivYSVN2D0xG5krqAczoU-vBMQ" />

  <!-- Schema Markup (JSON-LD) cho Google và AI Bots -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "BuildFolderTogether",
    "alternateName": "Build Folder Together",
    "url": "https://build-folder-together.vercel.app/",
    "description": "A free, real-time collaborative file tree generator and editor. Create, share, export to ZIP, and import ASCII folder structures instantly.",
    "applicationCategory": "DeveloperApplication",
    "operatingSystem": "Any",
    "keywords": "folder structure generator, file tree creator, ASCII tree generator, directory structure, clean architecture, developer tools, WebRTC collaboration",
    "sameAs": [
      "https://github.com/TinhSsc/BuildFolderTogether"
    ],
    "featureList": [
      "Real-time P2P Collaboration",
      "Drag and Drop Interface",
      "Export to ZIP archive",
      "Import/Export ASCII Trees",
      "Auto .gitkeep insertion"
    ],
    "offers": {
      "@type": "Offer",
      "price": "0",
      "priceCurrency": "USD"
    }
  }
  </script>

  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/tree.css">
  <link rel="stylesheet" href="css/context-menu.css">
</head>

<body class="modern-theme" data-theme="dark">

  <div class="app-layout" id="app">
    <!-- Sidebar -->
    <aside class="app-sidebar">
      <div class="sidebar-header">
        <i class='bx bx-folder-open logo-icon'></i>
        <h2>BuildFolder</h2>
      </div>
      
      <div class="sidebar-menu">
        <button id="themeToggleBtn" class="menu-btn"><i class='bx bx-moon'></i> <span id="themeToggleText">Dark Mode</span></button>
        <button id="switchLangBtn" class="menu-btn"><i class='bx bx-globe'></i> <span>🇺🇸 English</span></button>
        <div class="menu-divider"></div>
        <button id="templatesToggleBtn" class="menu-btn"><i class='bx bx-layout'></i> <span>Templates</span></button>
        <button id="aiToggleBtn" class="menu-btn gradient-text"><i class='bx bx-bot'></i> <span>AI Generate</span></button>
        <button id="importToggleBtn" class="menu-btn"><i class='bx bx-import'></i> <span>Import ASCII</span></button>
      </div>
      
      <div class="sidebar-bottom">
        <div class="room-panel">
          <h4>Collaboration</h4>
          <span id="roomStatus" class="room-status-badge"><i class='bx bx-radio-circle-marked'></i> Offline</span>
          <div class="room-actions">
            <input id="roomInput" placeholder="Room Code..." />
            <button id="joinRoomBtn" class="btn-sm">Join</button>
          </div>
          <button id="createRoomBtn" class="btn-sm primary-sm">Create New Room</button>
          <button id="shareLinkBtn" class="btn-sm" style="display:none;"><i class='bx bx-share-alt'></i> Share Link</button>
        </div>
      </div>
    </aside>

    <!-- Main Workspace -->
    <main class="app-main">
      <header class="app-header">
        <div class="header-left">
          <h1 id="titleText">Project Architecture</h1>
          <span class="hint" id="hintText">Drag & drop, Ctrl+Click to multi-select, Right-click for menu</span>
        </div>
        <div class="header-right">
          <div class="search-box">
            <i class='bx bx-search'></i>
            <input id="searchInput" placeholder="Search files/folders..." />
            <button id="searchClearBtn"><i class='bx bx-x'></i></button>
          </div>
        </div>
      </header>

      <!-- Floating Command Bar -->
      <div class="command-bar">
        <div class="cmd-group">
          <button id="addRootFolder" class="cmd-btn" title="Add Folder"><i class='bx bx-folder-plus'></i> <span>Folder</span></button>
          <button id="addRootFile" class="cmd-btn" title="Add File"><i class='bx bx-file-plus'></i> <span>File</span></button>
        </div>
        <div class="cmd-sep"></div>
        <div class="cmd-group">
          <button id="cutBtn" class="cmd-btn icon-only" title="Cut (Ctrl+X)"><i class='bx bx-cut'></i></button>
          <button id="copyBtn" class="cmd-btn icon-only" title="Copy (Ctrl+C)"><i class='bx bx-copy'></i></button>
          <button id="pasteBtn" class="cmd-btn icon-only" title="Paste (Ctrl+V)"><i class='bx bx-paste'></i></button>
          <button id="duplicateBtn" class="cmd-btn icon-only" title="Duplicate (Ctrl+D)"><i class='bx bx-copy-alt'></i></button>
          <button id="deleteSelectedBtn" class="cmd-btn icon-only danger" title="Delete"><i class='bx bx-trash'></i></button>
        </div>
        <div class="cmd-sep"></div>
        <div class="cmd-group">
          <button id="undoBtn" class="cmd-btn icon-only" title="Undo (Ctrl+Z)"><i class='bx bx-undo'></i></button>
          <button id="redoBtn" class="cmd-btn icon-only" title="Redo (Ctrl+Y)"><i class='bx bx-redo'></i></button>
        </div>
        <div class="cmd-sep"></div>
        <div class="cmd-group">
          <button id="collapseAllBtn" class="cmd-btn icon-only" title="Collapse All"><i class='bx bx-collapse-vertical'></i></button>
          <button id="expandAllBtn" class="cmd-btn icon-only" title="Expand All"><i class='bx bx-expand-vertical'></i></button>
        </div>
        <div class="cmd-sep"></div>
        <div class="cmd-group">
          <button id="exportBtn" class="cmd-btn" title="Export ASCII"><i class='bx bx-export'></i></button>
          <button id="uploadZipBtn" class="cmd-btn" title="Upload ZIP"><i class='bx bxs-file-archive'></i></button>
          <input type="file" id="zipFileInput" accept=".zip" style="display:none" />
          <button id="zipBtn" class="cmd-btn primary" title="Download ZIP"><i class='bx bxs-download'></i> <span>ZIP</span></button>
        </div>
      </div>

      <!-- Tree Container -->
      <div class="tree-workspace">
        <div class="tree" id="tree"></div>
      </div>

      <!-- Footer / Status Bar -->
      <footer class="app-status-bar">
        <div class="status-left">
          <span id="statState"><i class='bx bxs-circle' style="color: #10b981; font-size: 8px;"></i> Ready</span>
          <span class="status-sep"></span>
          <span id="statNodes">0 Nodes</span>
        </div>
        <div class="status-right">
          <span id="status"></span>
        </div>
      </footer>
    </main>
  </div>

  <!-- Panels & Modals (Absolute positioned) -->
  
  <!-- Import Box -->
  <div class="panel-overlay" id="importBox" style="display: none;">
    <div class="panel-content">
      <h3 id="importTitle"><i class='bx bx-import'></i> Import ASCII Tree</h3>
      <textarea id="importInput" rows="10" placeholder="Paste text tree structure here..."></textarea>
      <div class="panel-actions">
        <button class="btn btn-secondary" id="importCancelBtn">Cancel</button>
        <button class="btn btn-primary" id="importApplyBtn">Apply</button>
      </div>
    </div>
  </div>

  <!-- AI Box -->
  <div class="panel-overlay" id="aiBox" style="display: none;">
    <div class="panel-content ai-panel">
      <div class="panel-header">
        <h3 id="aiBoxTitle"><i class='bx bx-bot'></i> Generate with AI</h3>
        <button id="aiToggleKeyBtn" class="icon-btn"><i class='bx bx-cog'></i></button>
      </div>
      
      <div id="aiKeySection" class="settings-section" style="display: none;">
        <label for="aiProvider">AI Provider:</label>
        <select id="aiProvider" class="form-select">
          <option value="gemini">Google Gemini</option>
          <option value="openai">OpenAI (ChatGPT)</option>
          <option value="openrouter">OpenRouter</option>
          <option value="ollama">Ollama (Local)</option>
        </select>
        
        <label id="aiLabelKey" for="aiApiKey">API Key:</label>
        <input type="password" id="aiApiKey" class="form-input" placeholder="..." />
        <p id="aiKeyHint" class="hint-text">Key is stored safely in your browser.</p>
      </div>
      
      <textarea id="aiPrompt" rows="4" class="form-input" placeholder="Describe your project (e.g. A Node.js API with src, routes, controllers...)"></textarea>
      
      <div class="panel-actions">
        <button class="btn btn-secondary" id="aiCancelBtn">Cancel</button>
        <button class="btn btn-primary gradient-bg" id="aiGenerateBtn"><i class='bx bx-magic-wand'></i> Generate Tree</button>
      </div>
    </div>
  </div>

  <!-- Templates Box -->
  <div class="panel-overlay" id="templatesBox" style="display: none;">
    <div class="panel-content templates-panel">
      <div class="panel-header">
        <h3><i class='bx bx-layout'></i> Project Templates</h3>
        <button id="templatesCloseBtn" class="icon-btn"><i class='bx bx-x'></i></button>
      </div>
      <div id="templatesList" style="display: grid; gap: 12px; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); margin-bottom: 16px;">
        <!-- JS will populate -->
      </div>
    </div>
  </div>

  <div class="export-box" id="exportBox" style="display:none;">
    <textarea id="exportOutput" readonly></textarea>
  </div>

  <!-- Adsense Section -->
  <div class="ad-container bottom-ad" style="display:none;">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3405863331117687" crossorigin="anonymous"></script>
    <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-3405863331117687" data-ad-slot="YYYYYYYYYY" data-ad-format="auto" data-full-width-responsive="true"></ins>
    <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
  </div>

  <!-- Scripts -->
  <script src="libs/jszip.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/lang/vi.js"></script>
  <script src="js/lang/en.js"></script>
  <script src="js/lang/i18n.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/history.js"></script>
  <script src="js/tree.js"></script>
  <script src="js/search.js"></script>
  <script src="js/contextMenu.js"></script>
  <script src="js/render.js"></script>
  <script src="js/room.js"></script>
  <script src="js/ai.js"></script>
  <script src="js/zip.js"></script>
  <script src="js/templates.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
